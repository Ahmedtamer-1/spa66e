<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spa66e</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Splash Screen / Home Page -->
    <div id="splash-screen" class="splash">
        <img src="custom-right.jpg" class="splash-img" alt="sigil">
        <h1 class="splash-logo">spa66e</h1>
        <button id="enter-archive" class="enter-btn">[ ENTER ARCHIVE ]</button>
    </div>

    <!-- Main Content (Hidden until entered) -->
    <div id="main-content" class="hidden-content">
        <!-- Background Sigils -->
        <img src="custom-right.jpg" class="sigil-bg right" alt="" onerror="this.style.display='none'">

        <header class="top-nav">
            <div class="logo">spa66e</div>
            <div class="archive-info">
                <span class="pulse"></span> [ SYSTEM ONLINE ]<br>
                ARCHIVE DIRECTORY v1.0
            </div>
        </header>

        <nav class="main-nav">
            <button class="main-nav-btn active" data-target="section-edits">[ EDITS ]</button>
            <button class="main-nav-btn" data-target="section-lookbook">[ LOOKBOOK ]</button>
            <button class="main-nav-btn" data-target="section-music">[ MUSIC ]</button>
        </nav>

        <main class="container">
            <!-- Edits Section -->
            <div id="section-edits" class="content-section">
                <nav class="filter-nav" id="filter-nav">
                    <!-- Categories injected via JS -->
                </nav>
                <section id="video-gallery" class="gallery-grid">
                    <!-- Video cards injected via JS -->
                </section>
            </div>

            <!-- Lookbook Section -->
            <div id="section-lookbook" class="content-section hidden-section">
                <div class="coming-soon">
                    <span class="coming-soon-sigil">✦</span>
                    <h2>[ LOOKBOOK ]</h2>
                    <p class="blink-slow">[ TRANSMISSION PENDING ]</p>
                    <p class="section-desc">ARCHIVE CLOTHING & VISUAL LOOKS SERIES</p>
                </div>
            </div>

            <!-- Music Section -->
            <div id="section-music" class="content-section hidden-section">
                <div class="coming-soon">
                    <span class="coming-soon-sigil">✦</span>
                    <h2>[ MUSIC ]</h2>
                    <p class="blink-slow">[ TRANSMISSION PENDING ]</p>
                    <p class="section-desc">SOUNDS, MIXES & AUDIOWORK ARCHIVES</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Video Modal -->
    <div id="video-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button id="close-modal" class="close-btn" aria-label="Close Video">&times;</button>
            <div class="video-container">
                <video id="modal-video" autoplay playsinline>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <!-- Custom Gothic Player Controls -->
                <div class="player-controls">
                    <button id="player-play-pause" class="player-btn" aria-label="Play/Pause">[ PLAY ]</button>
                    
                    <div class="player-progress-container">
                        <input type="range" id="player-progress" min="0" max="100" value="0" step="0.1" aria-label="Timeline">
                    </div>
                    
                    <div id="player-time" class="player-time">00:00 / 00:00</div>
                    
                    <div class="player-volume-container">
                        <button id="player-mute" class="player-btn" aria-label="Mute/Unmute">[ VOL ]</button>
                        <input type="range" id="player-volume" min="0" max="1" value="1" step="0.05" aria-label="Volume">
                    </div>
                    
                    <button id="player-fullscreen" class="player-btn" aria-label="Fullscreen">[ FULL ]</button>
                </div>
            </div>
            <h2 id="modal-title" class="modal-title"></h2>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
